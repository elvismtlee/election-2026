# AI 圖片素材包（2026-05-02）

- 檔案：`image-prompts-2026-05-02.csv`
- 張數：`22` 張提示詞
- 用途：網站首圖、新聞配圖、Facebook 輪播、YouTube 分鏡圖
- 必加標示：`AI 情境示意圖，非真實新聞照片`

## 生成建議
1. 先生成 `1, 2, 6, 20` 四張作為主題檔。
2. 其餘依文章段落補圖，每段 `1-2` 張。
3. 同一主題至少輸出 `2` 個版本，方便人工審稿挑選。

## 檔案命名規則
- `chiayi-2026-05-02-01-cover-v1.jpg`
- `chiayi-2026-05-02-02-market-v1.jpg`

## 版權與合規
- 圖像僅作政策溝通示意，不得標示為現場新聞照片。
- 避免出現可識別個資、真實車牌、品牌商標特寫。
